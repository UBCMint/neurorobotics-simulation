behaviors:
  MintRobotBalance:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000
    time_horizon: 64
    summary_freq: 50000

environment_parameters:
  stiffness:
    sampler_type: gaussian
    sampler_parameters:
      mean: 100.0
      st_dev: 20.0

  damping:
    sampler_type: gaussian
    sampler_parameters:
      mean: 50.0
      st_dev: 10.0

  floorFriction:
    sampler_type: uniform
    sampler_parameters:
      min_value: 0.3
      max_value: 0.9


